<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DevStation Builder{% endblock %}</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS (local) -->
  <link href="/static/assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons (local) -->
  <link href="/static/assets/vendor/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
  <!-- NiceAdmin style (nosso layout autossuficiente, enriquecido pelo NiceAdmin) -->
  <link href="/static/assets/css/style.css" rel="stylesheet">

  <style>
  /* ════════════════════════════════════════════════════
     DevStation Builder — Admin Layout Autossuficiente
     Funciona sem NiceAdmin. Se presente, enriquece o visual.
     ════════════════════════════════════════════════════ */
  :root {
    --hh: 60px; --sw: 260px;
    --accent: #4154f1; --accent-soft: #eef2ff;
    --primary-dark: #012970; --border: #e0e6f0;
    --bg-body: #f6f9ff; --bg-surface: #ffffff;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family:'Open Sans',sans-serif; background:var(--bg-body); color:#444; margin:0; }
  h1,h2,h3,h4,h5,h6 { font-family:'Nunito',sans-serif; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { color:#717ff5; }

  /* HEADER */
  #dsb-header {
    position:fixed; top:0; left:0; right:0; height:var(--hh);
    background:#fff; border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 20px; gap:12px;
    z-index:997; box-shadow:0 2px 20px rgba(1,41,112,.07);
  }
  .dsb-logo {
    display:flex; align-items:center; gap:8px;
    font-family:'Nunito',sans-serif; font-weight:700; font-size:16px;
    color:var(--primary-dark); white-space:nowrap; text-decoration:none;
  }
  .dsb-logo i { font-size:22px; color:var(--accent); line-height:1; }
  .dsb-logo:hover { color:var(--primary-dark); }
  .dsb-toggle {
    font-size:20px; cursor:pointer; color:#aaa; padding:4px 8px;
    border-radius:4px; background:none; border:none; transition:color .2s;
  }
  .dsb-toggle:hover { color:var(--accent); }
  .dsb-header-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  .dsb-version {
    background:#e8f5e9; color:#2e7d32; font-size:11px; font-weight:600;
    padding:3px 10px; border-radius:20px;
  }

  /* SIDEBAR */
  #dsb-sidebar {
    position:fixed; top:var(--hh); left:0; bottom:0; width:var(--sw);
    background:#fff; border-right:1px solid var(--border);
    overflow-y:auto; overflow-x:hidden; z-index:996;
    transition:transform .25s ease; padding:10px 0;
  }
  #dsb-sidebar::-webkit-scrollbar { width:4px; }
  #dsb-sidebar::-webkit-scrollbar-thumb { background:#d0d8f0; border-radius:2px; }

  .dsb-nav { list-style:none; margin:0; padding:0; }
  .dsb-nav-heading {
    font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.8px; color:#aab0c4; padding:16px 20px 5px;
    pointer-events:none;
  }
  .dsb-nav .nav-item { display:block; }
  .dsb-nav .nav-link {
    display:flex; align-items:center; gap:10px; height:40px; padding:0 20px;
    color:#555; font-size:14px; font-weight:500; text-decoration:none;
    border-left:3px solid transparent; transition:background .15s, color .15s;
  }
  .dsb-nav .nav-link i { font-size:16px; color:#8a93b8; min-width:20px; text-align:center; transition:color .15s; }
  .dsb-nav .nav-link:hover,
  .dsb-nav .nav-link.active {
    background:var(--accent-soft); color:var(--accent); border-left-color:var(--accent);
  }
  .dsb-nav .nav-link:hover i, .dsb-nav .nav-link.active i { color:var(--accent); }

  /* MAIN */
  #dsb-main {
    margin-top:var(--hh); margin-left:var(--sw);
    padding:28px 30px; min-height:calc(100vh - var(--hh));
    transition:margin-left .25s ease;
  }
  body.sb-collapsed #dsb-sidebar { transform:translateX(-100%); }
  body.sb-collapsed #dsb-main    { margin-left:0; }

  /* PAGE TITLE */
  .pagetitle { margin-bottom:20px; }
  .pagetitle h1 { font-size:22px; font-weight:700; color:var(--primary-dark); margin:0 0 4px; }
  .breadcrumb { background:none; padding:0; margin:0; font-size:13px; }
  .breadcrumb-item.active { color:#888; }
  .breadcrumb-item+.breadcrumb-item::before { color:#bbb; }

  /* PROJECT CARDS */
  .proj-card {
    border:none; border-radius:10px;
    box-shadow:0 2px 12px rgba(1,41,112,.07);
    transition:transform .15s, box-shadow .15s;
    cursor:pointer; overflow:hidden; height:100%;
  }
  .proj-card:hover { transform:translateY(-3px); box-shadow:0 6px 22px rgba(1,41,112,.13); }
  .proj-thumb {
    height:130px;
    background:linear-gradient(135deg,#eef2ff 0%,#f6f9ff 100%);
    border-bottom:1px solid #eef2ff;
    display:flex; align-items:center; justify-content:center;
  }
  .proj-thumb i { font-size:3rem; color:var(--accent); opacity:.25; }
  .proj-card .card-body { padding:14px 16px 8px; }
  .proj-title { font-size:14px; font-weight:700; color:var(--primary-dark); margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .proj-meta  { display:flex; gap:10px; flex-wrap:wrap; }
  .proj-meta small { font-size:11.5px; color:#888; display:flex; align-items:center; gap:3px; }
  .proj-card .card-footer { background:transparent; border-top:1px solid var(--border); padding:10px 16px 14px; display:flex; gap:6px; }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:60px 20px; background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(1,41,112,.06); }
  .empty-state .empty-icon { font-size:5rem; color:#dde4f8; display:block; margin-bottom:16px; }
  .empty-state h5 { color:#888; font-weight:600; }
  .empty-state p  { color:#aaa; font-size:14px; }

  /* RESPONSIVE */
  @media (max-width:991px) {
    #dsb-sidebar { transform:translateX(-100%); }
    #dsb-sidebar.mobile-show { transform:translateX(0); box-shadow:4px 0 20px rgba(0,0,0,.12); }
    #dsb-main { margin-left:0; padding:20px 16px; }
  }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════ -->
<header id="dsb-header">
  <a href="/" class="dsb-logo">
    <i class="bi bi-layout-wtf"></i>
    <span>DevStation Builder</span>
  </a>
  <button class="dsb-toggle" id="btnToggleSidebar" title="Toggle Sidebar">
    <i class="bi bi-list"></i>
  </button>
  <div class="dsb-header-right">
    <a href="/" class="btn btn-sm btn-light border" title="Dashboard">
      <i class="bi bi-house-fill text-primary"></i>
    </a>
    <span class="dsb-version">v2.1 MVC</span>
  </div>
</header>

<!-- ══ SIDEBAR ═════════════════════════════════════════════ -->
<aside id="dsb-sidebar">
  <ul class="dsb-nav">
    <li class="nav-item">
      <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
        <i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span>
      </a>
    </li>
    <li class="dsb-nav-heading">Projetos</li>
    <li class="nav-item">
      <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#modalNovoProjeto">
        <i class="bi bi-plus-circle"></i><span>Novo Projeto</span>
      </a>
    </li>
    {% block sidebar_extra %}{% endblock %}
  </ul>
</aside>

<!-- ══ MAIN ════════════════════════════════════════════════ -->
<main id="dsb-main">
  {% block content %}{% endblock %}
</main>

<!-- ══ MODAL: Novo Projeto ══════════════════════════════════ -->
<div class="modal fade" id="modalNovoProjeto" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" style="color:#012970;">
          <i class="bi bi-plus-circle me-2 text-primary"></i>Novo Projeto
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.5px;">Nome do Projeto</label>
          <input id="inputNomeProjeto" type="text" class="form-control form-control-lg" placeholder="Ex: Landing Page, CRM, Portal...">
        </div>
        <div class="mb-1">
          <label class="form-label fw-semibold" style="font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.5px;">
            Descrição <small class="text-muted fw-normal">(opcional)</small>
          </label>
          <input id="inputDescProjeto" type="text" class="form-control" placeholder="Breve descrição do projeto...">
        </div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button class="btn btn-light px-4" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary px-4" id="btnCriarProjeto">
          <i class="bi bi-plus-lg me-1"></i>Criar Projeto
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ══ SCRIPTS ══════════════════════════════════════════════ -->
<!-- Bootstrap JS (local) -->
<script src="/static/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<!-- NiceAdmin JS (melhora sidebar toggle se presente) -->
<script src="/static/assets/js/main.js"></script>

<script>
(function () {
  /* ── Sidebar toggle (autossuficiente) ───────────────── */
  const btn     = document.getElementById('btnToggleSidebar');
  const sidebar = document.getElementById('dsb-sidebar');
  const body    = document.body;

  btn?.addEventListener('click', () => {
    if (window.innerWidth < 992) {
      sidebar.classList.toggle('mobile-show');
    } else {
      body.classList.toggle('sb-collapsed');
    }
  });

  document.addEventListener('click', (e) => {
    if (window.innerWidth < 992 && sidebar &&
        !sidebar.contains(e.target) && e.target !== btn && !btn?.contains(e.target)) {
      sidebar.classList.remove('mobile-show');
    }
  });

  /* ── Criar Projeto ──────────────────────────────────── */
  document.getElementById('btnCriarProjeto')?.addEventListener('click', async () => {
    const btn  = document.getElementById('btnCriarProjeto');
    const name = document.getElementById('inputNomeProjeto').value.trim() || 'Projeto Sem Título';

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Criando...';

    try {
      const fd = new FormData();
      fd.append('name', name);
      const r = await fetch('/projetos/novo', { method: 'POST', body: fd });
      const d = await r.json();
      window.location.href = '/designer/' + d.id;
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-plus-lg me-1"></i>Criar Projeto';
      alert('Erro ao criar projeto: ' + err.message);
    }
  });

  document.getElementById('inputNomeProjeto')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btnCriarProjeto')?.click();
  });
})();
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
