<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DevStation Builder v3.0{% endblock %}</title>
  <style>
    /* ── Reset + Base ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ds-primary:     #012970;
      --ds-accent:      #4154f1;
      --ds-light:       #f6f9ff;
      --ds-border:      #e0e6ed;
      --ds-text:        #444;
      --ds-success:     #2eca6a;
      --ds-warning:     #f8961e;
      --ds-danger:      #dc3545;
      --ds-sidebar-w:   240px;
      --ds-header-h:    54px;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--ds-light); color: var(--ds-text); }

    /* ── Header ────────────────────────────────────────── */
    .ds-header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--ds-header-h);
      background: var(--ds-primary); color: #fff;
      display: flex; align-items: center; padding: 0 16px; gap: 16px; z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .ds-logo { font-weight: 700; font-size: 1rem; letter-spacing: .5px; white-space: nowrap;
               color: #fff; text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .ds-logo-badge { background: var(--ds-accent); padding: 2px 6px; border-radius: 4px; font-size:.7rem; }

    /* Transaction quick-access box */
    .ds-tx-box { display: flex; align-items: center; flex: 1; max-width: 380px;
                 background: rgba(255,255,255,.12); border-radius: 6px; overflow: hidden;
                 border: 1px solid rgba(255,255,255,.2); }
    .ds-tx-box input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #fff; padding: 6px 10px; font-size: .85rem;
    }
    .ds-tx-box input::placeholder { color: rgba(255,255,255,.6); }
    .ds-tx-box button {
      background: transparent; border: none; color: #fff; padding: 6px 10px;
      cursor: pointer; font-size: 1.1rem; line-height: 1;
    }
    .ds-tx-box button:hover { background: rgba(255,255,255,.15); }

    /* Dropdown de autocomplete */
    #txDropdown {
      display: none; position: absolute; top: calc(var(--ds-header-h) + 2px);
      left: 50%; transform: translateX(-50%); width: 400px; max-width: 94vw;
      background: #fff; border: 1px solid var(--ds-border); border-radius: 6px;
      box-shadow: 0 6px 24px rgba(0,0,0,.15); z-index: 2000; overflow: hidden;
    }
    .tx-item { display: flex; align-items: center; padding: 8px 12px; cursor: pointer;
               border-bottom: 1px solid var(--ds-border); transition: background .1s; }
    .tx-item:last-child { border-bottom: none; }
    .tx-item:hover, .tx-item.active { background: var(--ds-light); }
    .tx-icon { font-size: 1rem; margin-right: 8px; color: var(--ds-accent); min-width: 20px; }
    .tx-code { font-weight: 600; font-size: .82rem; color: var(--ds-primary); }
    .tx-label { font-size: .78rem; }

    /* Nav links direita */
    .ds-nav-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .ds-nav-right a { color: rgba(255,255,255,.85); text-decoration: none; font-size: .82rem;
                      padding: 4px 8px; border-radius: 4px; transition: background .15s; }
    .ds-nav-right a:hover { background: rgba(255,255,255,.15); color: #fff; }

    /* ── Main layout ────────────────────────────────────── */
    .ds-main { padding-top: var(--ds-header-h); min-height: 100vh; }
    .ds-content { padding: 24px; }

    /* ── Cards ──────────────────────────────────────────── */
    .ds-card {
      background: #fff; border-radius: 8px; border: 1px solid var(--ds-border);
      box-shadow: 0 2px 6px rgba(0,0,0,.04); padding: 20px; margin-bottom: 16px;
    }
    .ds-card-title { font-weight: 600; color: var(--ds-primary); margin-bottom: 12px; font-size: .95rem; }

    /* ── Badges ─────────────────────────────────────────── */
    .badge-profile { font-size: .65rem; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
    .bp-USER      { background:#e8f5e9; color:#2e7d32; }
    .bp-PUSER     { background:#e3f2fd; color:#1565c0; }
    .bp-BANALYST  { background:#e8eaf6; color:#283593; }
    .bp-DEVELOPER { background:#e0f2f1; color:#00695c; }
    .bp-CORE_DEV  { background:#fff8e1; color:#e65100; }
    .bp-DEV_ALL   { background:#fff3e0; color:#bf360c; }
    .bp-ADMIN     { background:#fce4ec; color:#b71c1c; }

    /* ── Toasts ─────────────────────────────────────────── */
    .ds-toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .ds-toast { padding: 10px 16px; border-radius: 6px; color: #fff; font-size: .85rem;
                box-shadow: 0 4px 12px rgba(0,0,0,.2); animation: slideIn .25s ease; max-width: 320px; }
    .ds-toast-success { background: #1a7a4a; }
    .ds-toast-danger  { background: #c0392b; }
    .ds-toast-info    { background: var(--ds-accent); }
    @keyframes slideIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    /* ── Tabs ───────────────────────────────────────────── */
    .ds-tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--ds-border);
               margin-bottom: 20px; }
    .ds-tab { padding: 8px 16px; cursor: pointer; border: none; background: none;
              color: var(--ds-text); font-size: .88rem; border-bottom: 2px solid transparent;
              margin-bottom: -2px; transition: all .15s; border-radius: 4px 4px 0 0; }
    .ds-tab:hover { background: var(--ds-light); }
    .ds-tab.active { color: var(--ds-accent); border-bottom-color: var(--ds-accent);
                     font-weight: 600; }

    /* ── Buttons ────────────────────────────────────────── */
    .btn-ds-primary {
      background: var(--ds-accent); color: #fff; border: none; padding: 7px 16px;
      border-radius: 5px; cursor: pointer; font-size: .85rem; font-weight: 500;
      display: inline-flex; align-items: center; gap: 6px; transition: opacity .15s;
    }
    .btn-ds-primary:hover { opacity: .88; }
    .btn-ds-outline {
      background: transparent; color: var(--ds-accent); border: 1px solid var(--ds-accent);
      padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: .85rem;
      display: inline-flex; align-items: center; gap: 6px; transition: all .15s;
    }
    .btn-ds-outline:hover { background: var(--ds-accent); color: #fff; }
    .btn-ds-danger {
      background: var(--ds-danger); color: #fff; border: none; padding: 6px 14px;
      border-radius: 5px; cursor: pointer; font-size: .85rem;
    }
    .btn-xs { padding: 2px 7px; font-size: .75rem; border-radius: 3px; cursor: pointer; border: 1px solid; }

    /* ── Misc ───────────────────────────────────────────── */
    .text-primary-ds { color: var(--ds-primary); }
    .text-accent     { color: var(--ds-accent); }
    .gap-2 { gap: 8px; }
    .d-flex { display: flex; }
    .align-items-center { align-items: center; }
    .justify-content-between { justify-content: space-between; }
    .flex-grow-1 { flex: 1; }
    .fw-bold { font-weight: 700; }
    .fw-semibold { font-weight: 600; }
    .text-muted { color: #888; }
    .small { font-size: .82rem; }
    .me-1 { margin-right: 4px; }
    .me-2 { margin-right: 8px; }
    .ms-auto { margin-left: auto; }
    .mb-1 { margin-bottom: 4px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 16px; }
    .mb-4 { margin-bottom: 24px; }
    .mt-1 { margin-top: 4px; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 16px; }
    .p-2  { padding: 8px; }
    .p-3  { padding: 16px; }
    .px-2 { padding-left: 8px; padding-right: 8px; }
    .py-1 { padding-top: 4px; padding-bottom: 4px; }
    .py-2 { padding-top: 8px; padding-bottom: 8px; }
    .w-100 { width: 100%; }
    .border-bottom { border-bottom: 1px solid var(--ds-border); }
    .rounded { border-radius: 6px; }
    .overflow-hidden { overflow: hidden; }
    .text-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .opacity-50 { opacity: .5; }

    /* ── Spinner ────────────────────────────────────────── */
    .spinner-border-sm {
      display: inline-block; width: 1em; height: 1em;
      border: .15em solid currentColor; border-right-color: transparent;
      border-radius: 50%; animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>

  <!-- ── Header Global ─────────────────────────────────────────── -->
  <header class="ds-header">
    <a class="ds-logo" href="/">
      <i class="bi bi-diagram-3-fill"></i>
      DevStation
      <span class="ds-logo-badge">v3.0</span>
    </a>

    <!-- Campo de transação rápida -->
    <div style="position:relative;flex:1;max-width:380px;">
      <div class="ds-tx-box">
        <input id="inputTransacao" type="text"
               placeholder="Transação... (Ctrl+F5)" autocomplete="off">
        <button id="btnIrTransacao" title="Navegar">›</button>
      </div>
      <div id="txDropdown"></div>
    </div>

    <!-- Navegação direita -->
    <nav class="ds-nav-right">
      <a href="/?tab=projects"><i class="bi bi-folder2-open me-1"></i>Projetos</a>
      <a href="/transacoes/DS_PLUGINS"><i class="bi bi-puzzle me-1"></i>Plugins</a>
      <a href="/transacoes/DS_BUILD"><i class="bi bi-hammer me-1"></i>Build</a>
      <a href="/" title="Launchpad"><i class="bi bi-grid-3x3-gap-fill"></i></a>
    </nav>
  </header>

  <!-- ── Conteúdo principal ─────────────────────────────────────── -->
  <main class="ds-main">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Toast container ───────────────────────────────────────── -->
  <div class="ds-toast-container" id="dsToastContainer"></div>

  <!-- Bootstrap Icons (local fallback via CDN para desenvolvimento) -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        onerror="console.warn('BI CDN unavailable')">

  <!-- Scripts globais -->
  <script src="/static/js/transaction_nav.js"></script>
  <script>
    /* Toast helper global */
    function dsToast(msg, type) {
      var c = document.getElementById('dsToastContainer');
      var t = document.createElement('div');
      t.className = 'ds-toast ds-toast-' + (type || 'info');
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(function() { t.remove(); }, 3500);
    }
  </script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
